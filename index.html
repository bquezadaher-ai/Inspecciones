<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inspección RH/RS</title>

<style>

body{
  font-family:Arial,sans-serif;
  margin:0;
  background:#f2f2f2;
}

header{
  background:#8b0000;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
  font-size:20px;
}

main,#login{
  max-width:800px;
  margin:auto;
  padding:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

label{
  font-weight:bold;
  display:block;
  margin-top:12px;
}

input,select,textarea,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:6px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

textarea{
  min-height:120px;
}

button{
  background:#8b0000;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.95;
}

.item{
  border-bottom:1px solid #ddd;
  padding:10px 0;
}

.ok{
  color:green;
  font-weight:bold;
}

.error{
  color:red;
  font-weight:bold;
}

.info{
  background:#eee;
  padding:10px;
  border-radius:6px;
  margin-top:10px;
}

.foto-preview img{
  max-width:100px;
  margin:5px;
  border-radius:6px;
}

</style>

</head>

<body>

<header>
Inspección Red Húmeda / Red Seca
</header>

<div id="login">

  <div class="card">

    <h3>Ingreso operador</h3>

    <label>Usuario</label>
    <input type="text" id="usuarioLogin">

    <label>Clave</label>
    <input type="password" id="claveLogin">

    <button onclick="login()">
      Ingresar
    </button>

    <p id="loginEstado"></p>

  </div>

</div>

<main id="app" style="display:none;">

  <div class="card">

    <h3>Datos operador</h3>

    <label>Operador</label>
    <input type="text" id="operador" readonly>

    <div id="adminPanelBtn" style="display:none;">

      <button onclick="mostrarAdmin()">
        Panel Administrador
      </button>

    </div>

    <label>Proyecto</label>

    <select id="proyecto">
      <option value="">Seleccione proyecto</option>
    </select>

  </div>

  <div class="card" id="adminPanel" style="display:none;">

    <h2>Administrador</h2>

    <label>Nombre proyecto</label>
    <input type="text" id="adminNombreProyecto">

    <label>Dirección</label>
    <input type="text" id="adminDireccion">

    <label>Torres (una por línea)</label>

    <textarea id="adminTorresTexto"
placeholder="Ejemplo:

Torre Pacífico|18
Torre Bahía|22
Torre Mirador|12"></textarea>

    <button onclick="crearProyectoAutomatico()">
      Crear proyecto
    </button>

    <p id="adminEstado"></p>

  </div>

  <div class="card">

    <h3>Agregar punto</h3>

    <label>Torre</label>

    <select id="torre">
      <option value="">Seleccione torre</option>
    </select>

    <label>Sector</label>

    <select id="sector">
      <option>Ala Norte</option>
      <option>Ala Sur</option>
      <option>Central</option>
      <option>Subterráneo</option>
      <option>Azotea</option>
    </select>

    <label>Nivel</label>

    <select id="nivel">
      <option value="">Seleccione nivel</option>
    </select>

    <label>Sistema</label>

    <select id="sistema">
      <option>Red Húmeda</option>
      <option>Red Seca</option>
    </select>

    <label>Descripción</label>

    <input type="text" id="descripcionPunto">

    <button onclick="agregarPunto()">
      Agregar punto
    </button>

    <p id="estadoPunto"></p>

  </div>

  <div class="card">

    <h3>Punto a inspeccionar</h3>

    <label>Punto</label>

    <select id="punto" onchange="mostrarDatosPunto()">
      <option value="">Seleccione punto</option>
    </select>

    <div id="datosPunto"></div>

  </div>

  <div class="card">

    <h3>Checklist técnico</h3>

    <div id="checklistContainer"></div>

  </div>

  <div class="card">

    <h3>Evidencia fotográfica</h3>

    <label>Tipo fotografía</label>

    <select id="tipoFoto">
      <option>General</option>
      <option>Detalle</option>
      <option>Incumplimiento</option>
      <option>Señalización</option>
      <option>Accesibilidad</option>
    </select>

    <label>Tomar fotografía</label>

    <input
      type="file"
      id="fotoCamara"
      accept="image/*"
      capture="environment"
      onchange="previsualizarFotos()"
    >

    <label>Adjuntar desde galería</label>

    <input
      type="file"
      id="fotoGaleria"
      accept="image/*"
      multiple
      onchange="previsualizarFotos()"
    >

    <div class="foto-preview" id="preview"></div>

  </div>

  <div class="card">

    <button id="btnGuardar" onclick="guardarInspeccion()">
      Guardar inspección
    </button>

    <p id="estado"></p>

  </div>

</main>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbw4kZTWgxvScVU7Wp-VXJX0muQ75aFcp2ByHtAe0DX8ms4I9J5UW3otZiMbfnt6CyE4Fw/exec";

let proyectos = [];
let puntos = [];
let usuarioActual = null;

const checklistRH = [
"¿Se cuenta con al menos 01 red húmeda por piso?",
"¿La manguera cuenta con su respectivo pitón?",
"¿Los gabinetes se encuentran despejados?"
];

const checklistRS = [
"¿Se cuenta con red seca?",
"¿La conexión exterior es visible?",
"¿Las válvulas operan correctamente?"
];

function mostrarAdmin(){

  const panel =
    document.getElementById("adminPanel");

  if(panel.style.display === "none"){
    panel.style.display = "block";
  }else{
    panel.style.display = "none";
  }

}

async function login(){

  const usuario =
    document.getElementById("usuarioLogin").value.trim();

  const clave =
    document.getElementById("claveLogin").value.trim();

  const estado =
    document.getElementById("loginEstado");

  try{

    const res = await fetch(
      API_URL +
      "?op=login&usuario=" +
      encodeURIComponent(usuario) +
      "&clave=" +
      encodeURIComponent(clave)
    );

    const data =
      await res.json();

    if(!data.ok)
      throw new Error(data.msg);

    usuarioActual = data.usuario;

    document.getElementById("login").style.display =
      "none";

    document.getElementById("app").style.display =
      "block";

    document.getElementById("operador").value =
      data.usuario.Nombre;

    if(data.usuario.Rol === "admin"){

      document.getElementById("adminPanelBtn")
        .style.display = "block";

    }

    cargarProyectos();

  }catch(err){

    estado.innerHTML =
      `<span class="error">${err.message}</span>`;

  }

}

async function cargarProyectos(){

  const select =
    document.getElementById("proyecto");

  const res =
    await fetch(API_URL + "?op=proyectos");

  const data =
    await res.json();

  proyectos = data.proyectos;

  select.innerHTML =
    '<option value="">Seleccione proyecto</option>';

  proyectos.forEach(p => {

    select.innerHTML += `
      <option value="${p.ID}">
        ${p.Nombre}
      </option>
    `;

  });

}

async function crearProyectoAutomatico(){

  const texto =
    document.getElementById("adminTorresTexto").value;

  const nombre =
    document.getElementById("adminNombreProyecto").value;

  const direccion =
    document.getElementById("adminDireccion").value;

  const lineas =
    texto.split("\n");

  const torres = [];

  lineas.forEach(l => {

    const partes = l.split("|");

    if(partes.length >= 2){

      torres.push({
        nombre: partes[0].trim(),
        pisos: parseInt(partes[1].trim())
      });

    }

  });

  const payload = {

    op:"crearProyectoAutomatico",

    nombre:nombre,
    direccion:direccion,
    torres:torres

  };

  const res = await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify(payload)
  });

  const data =
    await res.json();

  document.getElementById("adminEstado").innerHTML =
    `<span class="ok">Proyecto creado.</span>`;

  cargarProyectos();

}

async function agregarPunto(){

  const payload = {

    op:"agregarPunto",

    proyectoID:
      document.getElementById("proyecto").value,

    torre:
      document.getElementById("torre").value,

    sector:
      document.getElementById("sector").value,

    nivel:
      document.getElementById("nivel").value,

    sistema:
      document.getElementById("sistema").value,

    descripcion:
      document.getElementById("descripcionPunto").value

  };

  const res = await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify(payload)
  });

  const data =
    await res.json();

  document.getElementById("estadoPunto").innerHTML =
    `<span class="ok">
      Punto creado:
      ${data.codigo}
    </span>`;

}

</script>

</body>
</html>
