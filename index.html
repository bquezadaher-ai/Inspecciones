<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspección RH/RS</title>

<style>
body{font-family:Arial,sans-serif;margin:0;background:#f2f2f2}
header{background:#8b0000;color:white;padding:15px;text-align:center;font-size:20px;font-weight:bold}
main,#login{max-width:900px;margin:auto;padding:15px}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px;box-shadow:0 2px 6px rgba(0,0,0,.15)}
label{display:block;margin-top:12px;font-weight:bold}
input,select,textarea,button{width:100%;padding:10px;margin-top:5px;border-radius:6px;border:1px solid #ccc;box-sizing:border-box}
textarea{min-height:120px}
button{background:#8b0000;color:white;border:none;font-weight:bold;cursor:pointer}
button:hover{opacity:.9}
.ok{color:green;font-weight:bold}
.error{color:red;font-weight:bold}
.info{background:#eee;padding:10px;border-radius:6px;margin-top:10px}
.foto-preview{display:flex;flex-wrap:wrap}
.foto-preview img{width:110px;height:110px;object-fit:cover;margin:5px;border-radius:8px;border:1px solid #ccc}
.tag{display:inline-block;padding:6px 10px;margin:4px;border-radius:20px;background:#f2f2f2;border:1px solid #ccc;font-size:14px}
</style>
</head>

<body>

<header>Inspección Red Húmeda / Red Seca</header>

<div id="login">
  <div class="card">
    <h2>Ingreso operador</h2>

    <label>Usuario</label>
    <input type="text" id="usuarioLogin">

    <label>Clave</label>
    <input type="password" id="claveLogin">

    <button onclick="login()">Ingresar</button>

    <p id="loginEstado"></p>
  </div>
</div>

<main id="app" style="display:none;">

  <div class="card">
    <h3>Datos operador</h3>

    <label>Operador</label>
    <input type="text" id="operador" readonly>

    <div id="adminPanelBtn" style="display:none;">
      <button onclick="mostrarAdmin()">Panel Administrador</button>
    </div>

    <label>Proyecto</label>
    <select id="proyecto" onchange="cargarTorres(); cargarPuntos();">
      <option value="">Seleccione proyecto</option>
    </select>
  </div>

  <div class="card" id="adminPanel" style="display:none;">
    <h2>Administrador</h2>

    <label>Nombre proyecto</label>
    <input type="text" id="adminNombreProyecto">

    <label>Dirección</label>
    <input type="text" id="adminDireccion">

    <label>Torres</label>
    <textarea id="adminTorresTexto" placeholder="Ejemplo:
Torre Pacífico|18
Torre Bahía|22"></textarea>

    <button onclick="crearProyectoAutomatico()">Crear proyecto</button>

    <p id="adminEstado"></p>
  </div>

  <div class="card">
    <h3>Agregar punto</h3>

    <label>Torre</label>
    <select id="torre" onchange="cargarNiveles()">
      <option value="">Seleccione torre</option>
    </select>

    <button onclick="generarInformeTorre()">Generar informe de torre</button>

    <label>Sector</label>
    <select id="sector">
      <option>Ala Norte</option>
      <option>Ala Sur</option>
      <option>Central</option>
      <option>Subterráneo</option>
      <option>Azotea</option>
    </select>

    <label>Nivel</label>
    <select id="nivel">
      <option value="">Seleccione nivel</option>
    </select>

    <label>Sistema</label>
    <select id="sistema">
      <option>Red Húmeda</option>
      <option>Red Seca</option>
    </select>

    <label>Descripción</label>
    <input type="text" id="descripcionPunto" placeholder="Ej: Gabinete escala norte">

    <button onclick="agregarPunto()">Agregar punto</button>

    <p id="estadoPunto"></p>
  </div>

  <div class="card">
    <h3>Punto a inspeccionar</h3>

    <label>Punto</label>
    <select id="punto" onchange="mostrarDatosPunto()">
      <option value="">Seleccione punto</option>
    </select>

    <div id="datosPunto"></div>
  </div>

  <div class="card">
    <h3>Aspectos a revisar</h3>
    <div id="recordatorioSistema">Seleccione un punto.</div>
  </div>

  <div class="card">
    <h3>Resultado inspección</h3>

    <label>Estado general</label>
    <select id="cumple">
      <option>Se realiza inspeccion</option>
      <option>No se realiza inspeccion</option>
    </select>

    <label>Observaciones relevantes</label>
    <textarea id="observacion" placeholder="Describa daños, fugas, corrosión, obstrucciones, señalética, etc."></textarea>
  </div>

  <div class="card">
  <h3>Evidencia fotográfica</h3>

  <label>Tomar fotografía</label>
  <input type="file" id="fotoCamara" accept="image/*" capture="environment" multiple onchange="previsualizarFotos()">

  <label>Adjuntar fotografías desde galería</label>
  <input type="file" id="fotoGaleria" accept="image/*" multiple onchange="previsualizarFotos()">

  <div class="foto-preview" id="preview"></div>
</div>

  <div class="card">
    <button id="btnGuardar" onclick="guardarInspeccion()">Guardar inspección</button>
    <p id="estado"></p>
  </div>

</main>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyNGXN34OO92XaadQADcaYa7qRF5oBFhWCAWNzrbYEeENRRuYI0Q4HfxdmDSdBjNKpaJw/exec";

let proyectos = [];
let puntos = [];
let torresProyecto = [];
let usuarioActual = null;

function mostrarAdmin(){
  const panel = document.getElementById("adminPanel");
  panel.style.display = panel.style.display === "none" ? "block" : "none";
}

async function login(){
  const usuario = document.getElementById("usuarioLogin").value.trim();
  const clave = document.getElementById("claveLogin").value.trim();
  const estado = document.getElementById("loginEstado");

  try{
    const res = await fetch(
      API_URL +
      "?op=login&usuario=" + encodeURIComponent(usuario) +
      "&clave=" + encodeURIComponent(clave)
    );

    const data = await res.json();

    if(!data.ok) throw new Error(data.msg);

    usuarioActual = data.usuario;

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("operador").value = data.usuario.Nombre;

    if(data.usuario.Rol === "admin"){
      document.getElementById("adminPanelBtn").style.display = "block";
    }

    cargarProyectos();

  }catch(err){
    estado.innerHTML = `<span class="error">${err.message}</span>`;
  }
}

async function cargarProyectos(){
  const select = document.getElementById("proyecto");

  const res = await fetch(API_URL + "?op=proyectos");
  const data = await res.json();

  proyectos = data.proyectos;

  select.innerHTML = '<option value="">Seleccione proyecto</option>';

  proyectos.forEach(p=>{
    select.innerHTML += `<option value="${p.ID}">${p.Nombre}</option>`;
  });
}

async function cargarTorres(){
  const proyectoID = document.getElementById("proyecto").value;
  const torreSelect = document.getElementById("torre");
  const nivelSelect = document.getElementById("nivel");

  torreSelect.innerHTML = '<option value="">Seleccione torre</option>';
  nivelSelect.innerHTML = '<option value="">Seleccione nivel</option>';

  if(!proyectoID) return;

  const res = await fetch(
    API_URL +
    "?op=torres&proyectoID=" +
    encodeURIComponent(proyectoID)
  );

  const data = await res.json();

  torresProyecto = data.torres;

  torresProyecto.forEach(t=>{
    torreSelect.innerHTML += `<option value="${t.Nombre}">${t.Nombre}</option>`;
  });
}

function cargarNiveles(){
  const torreNombre = document.getElementById("torre").value;
  const nivelSelect = document.getElementById("nivel");

  nivelSelect.innerHTML = '<option value="">Seleccione nivel</option>';

  const torre = torresProyecto.find(t => t.Nombre === torreNombre);

  if(!torre) return;

  const pisos = parseInt(torre.Pisos);

  for(let i=1; i<=pisos; i++){
    nivelSelect.innerHTML += `<option>Piso ${i}</option>`;
  }

  nivelSelect.innerHTML += `
    <option>Subterráneo -1</option>
    <option>Subterráneo -2</option>
    <option>Azotea</option>
  `;
}

async function cargarPuntos(){
  const proyectoID = document.getElementById("proyecto").value;
  const select = document.getElementById("punto");

  select.innerHTML = '<option value="">Seleccione punto</option>';

  if(!proyectoID) return;

  const res = await fetch(
    API_URL +
    "?op=puntos&proyectoID=" +
    encodeURIComponent(proyectoID)
  );

  const data = await res.json();

  puntos = data.puntos;

  puntos.forEach(p=>{
    select.innerHTML += `
      <option value="${p.ID}">
        ${p.Codigo} - ${p.Torre} - ${p.Sector} - ${p.Nivel}
      </option>
    `;
  });
}

async function crearProyectoAutomatico(){
  const nombre = document.getElementById("adminNombreProyecto").value.trim();
  const direccion = document.getElementById("adminDireccion").value.trim();
  const texto = document.getElementById("adminTorresTexto").value;
  const estado = document.getElementById("adminEstado");

  const torres = [];

  texto.split("\n").forEach(linea => {
    const partes = linea.split("|");
    if(partes.length >= 2){
      torres.push({
        nombre: partes[0].trim(),
        pisos: parseInt(partes[1].trim())
      });
    }
  });

  if(!nombre || torres.length === 0){
    estado.innerHTML = `<span class="error">Ingrese nombre del proyecto y torres.</span>`;
    return;
  }

  const payload = {
    op: "crearProyectoAutomatico",
    nombre,
    direccion,
    torres
  };

  try{
    const res = await fetch(API_URL,{
      method:"POST",
      body:JSON.stringify(payload)
    });

    const data = await res.json();

    if(data.ok){
      estado.innerHTML = `<span class="ok">Proyecto creado correctamente. Torres: ${data.torres}</span>`;
      cargarProyectos();
    }else{
      throw new Error(data.msg || "Error al crear proyecto.");
    }

  }catch(err){
    estado.innerHTML = `<span class="error">${err.message}</span>`;
  }
}

async function agregarPunto(){
  const proyectoID = document.getElementById("proyecto").value;
  const torre = document.getElementById("torre").value;
  const sector = document.getElementById("sector").value;
  const nivel = document.getElementById("nivel").value;
  const sistema = document.getElementById("sistema").value;
  const descripcion = document.getElementById("descripcionPunto").value;
  const estado = document.getElementById("estadoPunto");

  if(!proyectoID || !torre || !nivel){
    estado.innerHTML = `<span class="error">Seleccione proyecto, torre y nivel.</span>`;
    return;
  }

  try{
    const payload = {
      op:"agregarPunto",
      proyectoID,
      torre,
      sector,
      nivel,
      sistema,
      descripcion
    };

    const res = await fetch(API_URL,{
      method:"POST",
      body:JSON.stringify(payload)
    });

    const data = await res.json();

    if(data.ok){
      estado.innerHTML = `<span class="ok">Punto creado: ${data.codigo}</span>`;
      document.getElementById("descripcionPunto").value = "";
      cargarPuntos();
    }else{
      throw new Error(data.msg || "Error al agregar punto.");
    }

  }catch(err){
    estado.innerHTML = `<span class="error">${err.message}</span>`;
  }
}

function mostrarDatosPunto(){
  const puntoID = document.getElementById("punto").value;
  const p = puntos.find(x => String(x.ID) === String(puntoID));

  if(!p){
    document.getElementById("datosPunto").innerHTML = "";
    document.getElementById("recordatorioSistema").innerHTML = "Seleccione un punto.";
    return;
  }

  document.getElementById("datosPunto").innerHTML = `
    <div class="info">
      <p><strong>Torre:</strong> ${p.Torre}</p>
      <p><strong>Sector:</strong> ${p.Sector}</p>
      <p><strong>Nivel:</strong> ${p.Nivel}</p>
      <p><strong>Sistema:</strong> ${p.Sistema}</p>
      <p><strong>Código:</strong> ${p.Codigo}</p>
      <p><strong>Descripción:</strong> ${p.Descripcion}</p>
    </div>
  `;

  mostrarRecordatorio(p.Sistema);
}

function mostrarRecordatorio(sistema){
  const div = document.getElementById("recordatorioSistema");

  if(sistema.includes("Húmeda")){
    div.innerHTML = `
      <div class="info">
        <h4>Red Húmeda</h4>
        <span class="tag">Gabinete</span>
        <span class="tag">Manguera</span>
        <span class="tag">Pitón</span>
        <span class="tag">Válvula</span>
        <span class="tag">Fugas</span>
        <span class="tag">Corrosión</span>
        <span class="tag">Presión</span>
        <span class="tag">Acceso</span>
      </div>
    `;
  }else{
    div.innerHTML = `
      <div class="info">
        <h4>Red Seca</h4>
        <span class="tag">Conexión Bomberos</span>
        <span class="tag">Tapas</span>
        <span class="tag">Válvulas</span>
        <span class="tag">Fugas</span>
        <span class="tag">Corrosión</span>
        <span class="tag">Acceso</span>
      </div>
    `;
  }
}

function obtenerArchivosFotos(){
  const camara = Array.from(document.getElementById("fotoCamara").files);
  const galeria = Array.from(document.getElementById("fotoGaleria").files);
  return camara.concat(galeria);
}

function archivoABase64(file){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => {
      img.onload = () => {
        const maxAncho = 1280;
        const escala = Math.min(1, maxAncho / img.width);

        const canvas = document.createElement("canvas");
        canvas.width = img.width * escala;
        canvas.height = img.height * escala;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        const base64 = canvas.toDataURL("image/jpeg", 0.72);
        resolve(base64);
      };

      img.onerror = reject;
      img.src = e.target.result;
    };

    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function previsualizarFotos(){
  const files = obtenerArchivosFotos();
  const preview = document.getElementById("preview");

  preview.innerHTML = "";

  files.forEach(file => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
}

async function guardarInspeccion(){
  const puntoID = document.getElementById("punto").value;
  const punto = puntos.find(x => String(x.ID) === String(puntoID));
  const estado = document.getElementById("estado");
  const btn = document.getElementById("btnGuardar");

  if(!punto){
    estado.innerHTML = `<span class="error">Seleccione un punto.</span>`;
    return;
  }

  btn.disabled = true;
  btn.textContent = "Guardando...";
  estado.innerHTML = "Procesando fotografías...";

  try{
    const fotos = [];

    for(const file of obtenerArchivosFotos()){
      fotos.push({
        nombre:file.name,
        base64:await archivoABase64(file)
      });
    }

    const payload = {
      op:"guardarInspeccion",
      proyectoID:document.getElementById("proyecto").value,
      puntoID,
      operador:document.getElementById("operador").value,
      sistema:punto.Sistema,
      cumple:document.getElementById("cumple").value,
      criticidad:"",
      observacion:document.getElementById("observacion").value,
      estadoOperativo:document.getElementById("cumple").value,
      fotos
    };

    const res = await fetch(API_URL,{
      method:"POST",
      body:JSON.stringify(payload)
    });

    const data = await res.json();

    if(data.ok){
      estado.innerHTML = `<span class="ok">Inspección guardada correctamente.</span>`;
      document.getElementById("fotoCamara").value = "";
      document.getElementById("fotoGaleria").value = "";
      document.getElementById("preview").innerHTML = "";
      document.getElementById("observacion").value = "";

      if(punto){
        punto.Estado = "Revisado";
      }
      
      }else{
      throw new Error(data.msg || "Error al guardar.");
      }

  }catch(err){
    estado.innerHTML = `<span class="error">${err.message}</span>`;
  }

  btn.disabled = false;
  btn.textContent = "Guardar inspección";
}

async function generarInformeTorre(){
  const proyectoID = document.getElementById("proyecto").value;
  const torre = document.getElementById("torre").value;

  if(!proyectoID || !torre){
    alert("Seleccione proyecto y torre.");
    return;
  }

  const res = await fetch(
    API_URL +
    "?op=informeTorre&proyectoID=" + encodeURIComponent(proyectoID) +
    "&torre=" + encodeURIComponent(torre)
  );

  const data = await res.json();

  if(!data.ok){
    alert(data.msg || "Error al generar informe.");
    return;
  }

  const proyecto = data.proyecto || {};
  const registros = data.registros || [];

  let html = `
  <html>
  <head>
    <title>Informe ${torre}</title>
    <style>
      body{font-family:Arial,sans-serif;margin:30px;color:#222}
      h1,h2,h3,h4{color:#8b0000}
      .portada{border:2px solid #8b0000;padding:20px;margin-bottom:25px}
      .sector{margin-top:40px}
      .nivel{margin-top:25px;padding:10px;background:#eee}
      .registro{border:1px solid #aaa;padding:15px;margin-top:15px;page-break-inside:avoid}
      .foto{max-width:230px;margin:8px;border:1px solid #999}
      pre{white-space:pre-wrap;font-family:Arial,sans-serif}
      table{width:100%;border-collapse:collapse;margin-top:15px}
      td,th{border:1px solid #999;padding:8px}
      .firmas{margin-top:80px;display:flex;justify-content:space-between;gap:20px}
      .firma{width:32%;text-align:center;border-top:1px solid #000;padding-top:8px}
      @media print{button{display:none}}
    </style>
  </head>
  <body>

  <button onclick="window.print()">Imprimir / Guardar PDF</button>

  <div class="portada">
    <h1>Informe Inspección Red Húmeda / Red Seca</h1>
    <p><strong>Proyecto:</strong> ${proyecto.Nombre || ""}</p>
    <p><strong>Dirección:</strong> ${proyecto.Direccion || proyecto.Dirección || ""}</p>
    <p><strong>Torre:</strong> ${torre}</p>
    <p><strong>Fecha emisión:</strong> ${new Date().toLocaleString()}</p>

    <h3>Normativa aplicada</h3>
    <p>
      Ley 16.744, DS 50 - RIDAA, DS 594, DS 44,
      Circular 339 DDU MINVU, OGUC, NCh 1410,
      NCh 1411/2/4, NCh 2111, NFPA 14, NFPA 15.
    </p>
  </div>

  <h2>Resumen de la torre</h2>
  <table>
    <tr>
      <th>Total inspecciones</th>
      <th>Realizadas</th>
      <th>No realizadas</th>
    </tr>
    <tr>
      <td>${registros.length}</td>
      <td>${registros.filter(r => r.inspeccion.Cumple === "Se realiza inspeccion").length}</td>
      <td>${registros.filter(r => r.inspeccion.Cumple === "No se realiza inspeccion").length}</td>
    </tr>
  </table>
  `;

  const sectores = {};

  registros.forEach(r => {
    const sector = r.punto.Sector || "Sin sector";
    const nivel = r.punto.Nivel || "Sin nivel";

    if(!sectores[sector]) sectores[sector] = {};
    if(!sectores[sector][nivel]) sectores[sector][nivel] = [];

    sectores[sector][nivel].push(r);
  });

  Object.keys(sectores).forEach(sector => {
    html += `<div class="sector"><h2>${sector}</h2>`;

    Object.keys(sectores[sector]).forEach(nivel => {
      html += `<div class="nivel"><h3>${nivel}</h3>`;

      sectores[sector][nivel].forEach(r => {
        html += `
          <div class="registro">
            <h4>${r.punto.Codigo || ""}</h4>
            <p><strong>Sistema:</strong> ${r.punto.Sistema || ""}</p>
            <p><strong>Descripción:</strong> ${r.punto.Descripcion || ""}</p>
            <p><strong>Resultado:</strong> ${r.inspeccion.Cumple || ""}</p>

            <h4>Observaciones</h4>
            <pre>${r.inspeccion.Observacion || ""}</pre>

            <h4>Fotografías</h4>
        `;

        if(!r.fotos || r.fotos.length === 0){
          html += `<p>Sin fotografías adjuntas.</p>`;
        }

        (r.fotos || []).forEach(f => {
          html += `
            <div>
              <img class="foto" src="${f.Base64 || f.URL}">
            </div>
          `;
        });

        html += `</div>`;
      });

      html += `</div>`;
    });

    html += `</div>`;
  });

  html += `
    <div class="firmas">
      <div class="firma">Elaborado por<br>Firma y timbre</div>
      <div class="firma">Revisado por<br>Firma y timbre</div>
      <div class="firma">Recepción edificio<br>Firma y timbre</div>
    </div>

  </body>
  </html>
  `;

  const ventana = window.open("", "_blank");

  if(!ventana){
    alert("El navegador bloqueó la ventana emergente. Permite pop-ups para esta página e intenta nuevamente.");
    return;
  }

  ventana.document.open();
  ventana.document.write(html);
  ventana.document.close();
}
</script>

</body>
</html>
